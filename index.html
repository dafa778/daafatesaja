<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBTOOLSGET - RAZORDEV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            /* BACKGROUND JPG - GANTI DENGAN FOTO LO */
            background: url('https://files.catbox.moe/y9qunf.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        
        /* OVERLAY BIAR TEKS KELIATAN */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 0;
        }
        
        /* MUSIC CONTROL BUTTON */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #ff0040;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255,0,64,0.5);
            transition: all 0.3s;
        }
        
        .music-control:hover {
            transform: scale(1.1);
        }
        
        .music-control i {
            color: white;
            font-size: 24px;
        }
        
        .header {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-bottom: 2px solid #ff0040;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }
        
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
        }
        
        .logo i {
            color: #ff0040;
            margin-right: 10px;
        }
        
        .badge {
            background: rgba(255,0,64,0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #ff0040;
        }
        
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
            position: relative;
            z-index: 2;
        }
        
        .card {
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #ff0040;
            box-shadow: 0 0 30px rgba(255,0,64,0.2);
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .url-input {
            flex: 1;
            padding: 14px 18px;
            background: #0f0f1a;
            border: 1px solid #ff0040;
            border-radius: 10px;
            color: #00ff41;
            font-size: 14px;
            font-family: monospace;
        }
        
        .url-input:focus {
            outline: none;
            box-shadow: 0 0 10px #ff0040;
        }
        
        .btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #ff0040, #ff0066);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-family: monospace;
            transition: all 0.2s;
        }
        
        .btn-secondary {
            background: #1f2937;
            border: 1px solid #ff0040;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,0,64,0.3);
        }
        
        .status {
            background: rgba(15,15,26,0.9);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 3px solid #ff0040;
            color: #00ff41;
        }
        
        .loader {
            display: none;
            text-align: center;
            padding: 30px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,0,64,0.2);
            border-top-color: #ff0040;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(15,15,26,0.9);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            border: 1px solid #ff0040;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #ff0040;
        }
        
        .stat-label {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        
        .preview-area {
            margin-top: 25px;
            display: none;
        }
        
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .preview-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            background: #0f0f1a;
            border: 1px solid #ff0040;
            padding: 8px 16px;
            border-radius: 8px;
            color: #00ff41;
            cursor: pointer;
            font-size: 12px;
        }
        
        .tab-btn.active {
            background: #ff0040;
            color: #fff;
        }
        
        .preview-content {
            background: rgba(15,15,26,0.95);
            border-radius: 12px;
            padding: 20px;
            max-height: 500px;
            overflow: auto;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #00ff41;
        }
        
        .download-btn {
            display: inline-block;
            background: #00ff41;
            color: #000;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 20px;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #888;
            font-size: 12px;
        }
        
        @media (max-width: 768px) {
            .input-group {
                flex-direction: column;
            }
            .header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
        }
    </style>
    <!-- Font Awesome untuk icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- MUSIC AUTO PLAY -->
    <audio id="bgMusic" loop autoplay>
        <source src="https://files.catbox.moe/hujnza.mp3" type="audio/mpeg">
        <!-- GANTI URL MUSIK DI ATAS dengan file musik lo -->
    </audio>
    
    <div class="music-control" id="musicControl">
        <i class="fas fa-music" id="musicIcon"></i>
    </div>
    
    <div class="header">
        <div class="logo">
            <i class="fas fa-skull"></i> WEBTOOLSGET
        </div>
        <div class="badge">
            <i class="fas fa-dragon"></i> RAZOR TOOLSGET
        </div>
    </div>
    
    <div class="container">
        <div class="card">
            <div class="input-group">
                <input type="text" id="targetUrl" class="url-input" placeholder="https://example.com" value="https://">
                <button class="btn" id="stealBtn"><i class="fas fa-bolt"></i> STEAL CODE</button>
                <button class="btn btn-secondary" id="previewBtn"><i class="fas fa-eye"></i> PREVIEW</button>
            </div>
            
            <div class="status" id="statusMsg">
                <i class="fas fa-lock"></i> Enter a URL to steal source code
            </div>
            
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <div>Stealing source code...</div>
                <div style="font-size: 11px; margin-top: 8px;">Taking HTML, CSS, JS, images, and internal files</div>
            </div>
            
            <div class="result-stats" id="stats" style="display: none;"></div>
            
            <div class="preview-area" id="previewArea">
                <div class="preview-header">
                    <div class="preview-tabs" id="tabs"></div>
                    <button class="btn-secondary" id="closePreviewBtn" style="padding: 6px 12px;"><i class="fas fa-times"></i> Close</button>
                </div>
                <div class="preview-content" id="previewContent"></div>
            </div>
            
            <div id="downloadSection" style="display: none; text-align: center;">
                <a href="#" id="downloadLink" class="download-btn"><i class="fas fa-download"></i> DOWNLOAD ALL FILES (JSON)</a>
            </div>
        </div>
        
        <div class="footer">
            <p><i class="fas fa-shield-alt"></i> Educational purposes only. Only test websites you own.</p>
        </div>
    </div>
    
    <script>
        // ========== MUSIC CONTROL ==========
        const audio = document.getElementById('bgMusic');
        const musicControl = document.getElementById('musicControl');
        const musicIcon = document.getElementById('musicIcon');
        let musicPlaying = true;
        
        // Auto play attempt (browser may block, so user needs to interact)
        document.body.addEventListener('click', function() {
            if (audio.paused) {
                audio.play().catch(e => console.log('Auto play blocked, click to play'));
            }
        });
        
        musicControl.addEventListener('click', () => {
            if (musicPlaying) {
                audio.pause();
                musicIcon.className = 'fas fa-volume-mute';
            } else {
                audio.play();
                musicIcon.className = 'fas fa-music';
            }
            musicPlaying = !musicPlaying;
        });
        
        // Try to play on load (may be blocked)
        audio.play().catch(e => console.log('Autoplay blocked - user must interact first'));
        
        // ========== CORE STEALING FUNCTION ==========
        let currentData = null;
        let currentPreviewType = 'html';
        
        const stealBtn = document.getElementById('stealBtn');
        const previewBtn = document.getElementById('previewBtn');
        const targetUrl = document.getElementById('targetUrl');
        const loader = document.getElementById('loader');
        const statusMsg = document.getElementById('statusMsg');
        const statsDiv = document.getElementById('stats');
        const previewArea = document.getElementById('previewArea');
        const previewContent = document.getElementById('previewContent');
        const tabsDiv = document.getElementById('tabs');
        const downloadSection = document.getElementById('downloadSection');
        const downloadLink = document.getElementById('downloadLink');
        
        async function stealWebsiteCode(url) {
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            updateStatus('<i class="fas fa-spinner fa-pulse"></i> Fetching HTML...', 'warning');
            
            try {
                const htmlResponse = await fetch(url);
                if (!htmlResponse.ok) throw new Error(`HTTP ${htmlResponse.status}`);
                const html = await htmlResponse.text();
                
                updateStatus('<i class="fas fa-spinner fa-pulse"></i> Extracting CSS...', 'warning');
                const cssLinks = extractLinks(html, 'link', 'href', /stylesheet/i);
                const jsLinks = extractLinks(html, 'script', 'src', null);
                const imageLinks = extractImageLinks(html, url);
                
                updateStatus('<i class="fas fa-spinner fa-pulse"></i> Downloading CSS files...', 'warning');
                const cssFiles = await downloadFiles(cssLinks, url);
                
                updateStatus('<i class="fas fa-spinner fa-pulse"></i> Downloading JS files...', 'warning');
                const jsFiles = await downloadFiles(jsLinks, url);
                
                updateStatus('<i class="fas fa-spinner fa-pulse"></i> Fetching internal files...', 'warning');
                const internalFiles = await fetchInternalFiles(url);
                
                updateStatus('<i class="fas fa-spinner fa-pulse"></i> Creating preview...', 'warning');
                
                const result = {
                    url: url,
                    html: html,
                    cssFiles: cssFiles,
                    jsFiles: jsFiles,
                    images: imageLinks,
                    internalFiles: internalFiles,
                    timestamp: new Date().toISOString()
                };
                
                currentData = result;
                showStats(result);
                setupTabs(result);
                showDownloadLink(result);
                
                updateStatus(`<i class="fas fa-check-circle"></i> Success! Stole HTML + ${Object.keys(cssFiles).length} CSS + ${Object.keys(jsFiles).length} JS + ${internalFiles.length} internal files`, 'success');
                return result;
                
            } catch (error) {
                updateStatus(`<i class="fas fa-exclamation-triangle"></i> Error: ${error.message}`, 'error');
                return null;
            }
        }
        
        function extractLinks(html, tagName, attr, filterPattern) {
            const regex = new RegExp(`<${tagName}[^>]*${attr}=["']([^"']+)["'][^>]*>`, 'gi');
            const links = [];
            let match;
            while ((match = regex.exec(html)) !== null) {
                let link = match[1];
                if (filterPattern && !filterPattern.test(link)) continue;
                links.push(link);
            }
            return [...new Set(links)];
        }
        
        function extractImageLinks(html, baseUrl) {
            const imgRegex = /<img[^>]*src=["']([^"']+)["']/gi;
            const images = [];
            let match;
            while ((match = imgRegex.exec(html)) !== null) {
                let src = match[1];
                if (!src.startsWith('data:')) {
                    images.push({ src: src, url: resolveUrl(src, baseUrl) });
                }
            }
            return images;
        }
        
        function resolveUrl(url, baseUrl) {
            try {
                return new URL(url, baseUrl).href;
            } catch {
                return url;
            }
        }
        
        async function downloadFiles(links, baseUrl) {
            const results = {};
            for (const link of links.slice(0, 20)) {
                try {
                    const fullUrl = resolveUrl(link, baseUrl);
                    const response = await fetch(fullUrl);
                    if (response.ok) {
                        const content = await response.text();
                        results[fullUrl] = content;
                    }
                } catch (e) {}
            }
            return results;
        }
        
        async function fetchInternalFiles(baseUrl) {
            const internalFiles = ['robots.txt', 'sitemap.xml', 'security.txt', 'humans.txt'];
            const results = [];
            for (const file of internalFiles) {
                try {
                    const url = resolveUrl(file, baseUrl);
                    const response = await fetch(url);
                    if (response.ok) {
                        const content = await response.text();
                        results.push({ name: file, url: url, content: content });
                    }
                } catch (e) {}
            }
            return results;
        }
        
        function showStats(result) {
            const html = `
                <div class="stat-card">
                    <div class="stat-number"><i class="fas fa-code"></i></div>
                    <div class="stat-label">HTML</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${Object.keys(result.cssFiles).length}</div>
                    <div class="stat-label"><i class="fab fa-css3"></i> CSS Files</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${Object.keys(result.jsFiles).length}</div>
                    <div class="stat-label"><i class="fab fa-js"></i> JS Files</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${result.images.length}</div>
                    <div class="stat-label"><i class="fas fa-image"></i> Images</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${result.internalFiles.length}</div>
                    <div class="stat-label"><i class="fas fa-file"></i> Internal</div>
                </div>
            `;
            statsDiv.style.display = 'grid';
            statsDiv.innerHTML = html;
        }
        
        function setupTabs(result) {
            tabsDiv.innerHTML = `
                <button class="tab-btn active" onclick="switchTab('html')"><i class="fab fa-html5"></i> HTML</button>
                <button class="tab-btn" onclick="switchTab('css')"><i class="fab fa-css3"></i> CSS</button>
                <button class="tab-btn" onclick="switchTab('js')"><i class="fab fa-js"></i> JS</button>
                <button class="tab-btn" onclick="switchTab('internal')"><i class="fas fa-file-code"></i> Internal</button>
            `;
            
            window.tabContents = {
                html: result.html,
                css: formatFiles(result.cssFiles),
                js: formatFiles(result.jsFiles),
                internal: formatInternalFiles(result.internalFiles)
            };
            previewContent.textContent = window.tabContents.html;
        }
        
        function formatFiles(files) {
            if (Object.keys(files).length === 0) return '// No files found\n';
            let output = '';
            for (const [url, content] of Object.entries(files)) {
                output += `\n/* ========== ${url} ========== */\n\n${content}\n\n`;
            }
            return output;
        }
        
        function formatInternalFiles(files) {
            if (files.length === 0) return '# No internal files found\n';
            let output = '';
            for (const file of files) {
                output += `\n/* ========== ${file.name} (${file.url}) ========== */\n\n${file.content}\n\n`;
            }
            return output;
        }
        
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${tabId}')"]`).classList.add('active');
            if (window.tabContents && window.tabContents[tabId]) {
                previewContent.textContent = window.tabContents[tabId];
            }
        };
        
        function showDownloadLink(result) {
            downloadSection.style.display = 'block';
            const dataStr = JSON.stringify(result, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            downloadLink.href = url;
            downloadLink.download = `code_steal_${Date.now()}.json`;
        }
        
        function updateStatus(msg, type = 'info') {
            let color = '#00ff41';
            if (type === 'error') color = '#ff0040';
            if (type === 'warning') color = '#ffaa00';
            statusMsg.innerHTML = msg;
            statusMsg.style.borderLeftColor = color;
        }
        
        function showPreview(html) {
            previewContent.textContent = html.substring(0, 50000);
            previewArea.style.display = 'block';
        }
        
        stealBtn.addEventListener('click', async () => {
            let url = targetUrl.value.trim();
            if (!url || url === 'https://') {
                updateStatus('<i class="fas fa-exclamation-circle"></i> Please enter a valid URL', 'error');
                return;
            }
            loader.style.display = 'block';
            statsDiv.style.display = 'none';
            previewArea.style.display = 'none';
            downloadSection.style.display = 'none';
            await stealWebsiteCode(url);
            loader.style.display = 'none';
        });
        
        previewBtn.addEventListener('click', async () => {
            let url = targetUrl.value.trim();
            if (!url || url === 'https://') {
                updateStatus('<i class="fas fa-exclamation-circle"></i> Please enter a URL first', 'error');
                return;
            }
            if (!url.startsWith('http')) url = 'https://' + url;
            updateStatus('<i class="fas fa-spinner fa-pulse"></i> Fetching HTML preview...', 'warning');
            try {
                const response = await fetch(url);
                const html = await response.text();
                showPreview(html);
                updateStatus('<i class="fas fa-check-circle"></i> Preview loaded', 'success');
            } catch (error) {
                updateStatus(`<i class="fas fa-exclamation-triangle"></i> Preview error: ${error.message}`, 'error');
            }
        });
        
        document.getElementById('closePreviewBtn').addEventListener('click', () => {
            previewArea.style.display = 'none';
        });
        
        targetUrl.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') stealBtn.click();
        });
    </script>
</body>
</html>
